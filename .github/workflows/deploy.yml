name: Deploy to EC2
on:
  push:
    branches: [ main ]      
  workflow_dispatch:         
# main에 push될 때만 배포
# 수동 실행 버튼(테스트용)
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e                              
            cd /var/www/mysite
            git pull origin main                
            sudo nginx -t                       
            sudo systemctl reload nginx
      - name: 배포 성공 알림
        if: success()
        run: |
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {"type": "TextBlock", "text": "✅ 배포 성공", "size": "Large", "weight": "Bolder"},
                    {"type": "TextBlock", "text": "'"${GITHUB_REPOSITORY}"' main 브랜치가 배포되었습니다. (커밋: '"${GITHUB_SHA::7}"')", "wrap": true}
                  ]
                }
              }]
            }'
        env:
          WEBHOOK_URL: ${{ secrets.WEB_HOOK_URL }}

      - name: 배포 실패 알림
        if: failure()
        run: |
          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {"type": "TextBlock", "text": "❌ 배포 실패", "size": "Large", "weight": "Bolder", "color": "Attention"},
                    {"type": "TextBlock", "text": "로그 확인: https://github.com/'"${GITHUB_REPOSITORY}"'/actions/runs/'"${GITHUB_RUN_ID}"'", "wrap": true}
                  ]
                }
              }]
            }'
        env:
          WEBHOOK_URL: ${{ secrets.WEB_HOOK_URL }}
